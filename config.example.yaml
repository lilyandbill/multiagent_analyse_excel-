# Excel Agent 配置文件

# Excel 配置
excel:
  # Excel 文件目录
  dir: "./excel"
  # 最大读取行数 (可选，默认 10000)
  max_rows: 10000

# 服务器配置 (可选)
server:
  host: "0.0.0.0"
  port: 8080

# 日志配置 (可选)
log:
  level: "info"
  format: "json"
  output_path: "./logs"
  filename: "app.log"
  max_size: 100
  max_backups: 7
  max_age: 7

ark:
  model: "gpt-4"
  api_key: "sk-..."
  base_url: "https://..."
  region: "cn-beijing"

openai:
  model: "gpt-4"
  api_key: "sk-..."
  base_url: "https://..."
  by_azure: false
