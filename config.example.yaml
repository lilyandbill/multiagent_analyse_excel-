# Excel Agent 配置文件

# LLM 配置
llm:
  # 模型名称
  model: ""
  # API Key (也可以通过环境变量 OPENAI_API_KEY 设置)
  api_key: ""
  # Base URL (可选，用于代理)
  base_url: ""
  # 温度参数 (可选，默认 0.7)
  temperature: 0.7

# Excel 配置
excel:
  # Excel 文件目录
  dir: "./excel"
  # 最大读取行数 (可选，默认 10000)
  max_rows: 10000

# 服务器配置 (可选)
server:
  host: "0.0.0.0"
  port: 8080

# 日志配置 (可选)
log:
  level: "info"
  format: "json"
  output_path: "./logs"
  filename: "app.log"
  max_size: 100
  max_backups: 7
  max_age: 7
